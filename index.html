<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestro Corazón Arácnido</title>
    <style>
        /* --- ESTILOS (CSS) --- */
        body {
            margin: 0;
            padding: 0;
            /* Fondo oscuro con un sutil degradado radial */
            background: radial-gradient(circle, #2a0a0a 0%, #050505 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden; /* Evita barras de desplazamiento */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Contenedor principal para centrar todo */
        .main-container {
            position: relative;
            text-align: center;
            z-index: 10; /* Asegura que la foto esté sobre los corazones flotantes */
        }

        /* --- El Corazón Principal (MÁGIA AQUÍ) --- */
        .heart-frame {
            position: relative;
            width: 450px; /* Tamaño del corazón grande */
            height: 400px;
            /* Usamos SVG path para un recorte de corazón perfecto */
            clip-path: path('M225,380 C-25,260 -25,100 100,40 C160,-10 210,30 225,50 C240,30 290,-10 350,40 C475,100 475,260 225,380 Z');
            
            /* Sombra y borde brillante alrededor del corazón */
            filter: drop-shadow(0 0 15px rgba(226, 16, 23, 0.8));
            border: 2px solid #e21017; /* Borde rojo Spider-Man */
            box-sizing: border-box;
            transition: transform 0.3s ease;
        }

        .heart-frame:hover {
            transform: scale(1.03); /* Pequeño efecto al pasar el mouse */
        }

        /* La foto dentro del corazón */
        .heart-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Asegura que la foto cubra todo el corazón sin deformarse */
            display: block;
        }

        /* Título decorativo */
        .titulo {
            color: white;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 1.2em;
            margin-top: 20px;
            text-shadow: 0 0 10px #e21017, 0 0 20px #e21017;
        }

        /* Estilo del reproductor de música */
        audio {
            margin-top: 15px;
            height: 30px;
            width: 250px;
            opacity: 0.7;
            border-radius: 15px;
        }

        /* --- Elementos Flotantes (CSS) --- */
        .floating-element {
            position: absolute;
            bottom: -50px;
            user-select: none;
            pointer-events: none;
            z-index: 1; /* Detrás de la foto principal */
            animation: moveUp linear forwards;
        }

        @keyframes moveUp {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 1; } /* Aparece suavemente */
            90% { opacity: 1; }
            100% {
                transform: translateY(-110vh) rotate(360deg);
                opacity: 0; /* Desaparece al llegar arriba */
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="heart-frame">
            <img src="tania.jpeg" 
                 alt="Nosotros">
        </div>

        <div class="titulo">Nuestro Sentido Arácnido</div>

        <audio controls loop>
            <source src="mi-cancion.ogg" type="audio/ogg">
            Tu navegador no soporta audio.
        </audio>
    </div>

    <script>
        /* --- LÓGICA DE ELEMENTOS FLOTANTES (JavaScript) --- */
        function createFloatingElement() {
            const container = document.body;
            const element = document.createElement('div');
            element.classList.add('floating-element');

            // Lista de elementos: Corazones, Arañas, Máscaras
            const items = ['❤️', '🕷️', '🕸️', '❤️', '🕷️'];
            element.innerText = items[Math.floor(Math.random() * items.length)];

            // Configuración aleatoria
            const size = Math.random() * 25 + 15; // Tamaño entre 15px y 40px
            const posX = Math.random() * 100; // Posición horizontal 0-100vw
            const duration = Math.random() * 4 + 3; // Duración entre 3s y 7s
            const delay = Math.random() * 2; // Retraso aleatorio al arrancar

            element.style.fontSize = `${size}px`;
            element.style.left = `${posX}vw`;
            element.style.animationDuration = `${duration}s`;
            element.style.animationDelay = `${delay}s`;

            // Color aleatorio: rojo Spider-Man o gris telaraña
            const colors = ['#e21017', '#e21017', '#a0a0a0'];
            element.style.color = colors[Math.floor(Math.random() * colors.length)];

            container.appendChild(element);

            // Limpieza: eliminar el elemento después de que termine la animación
            setTimeout(() => {
                element.remove();
            }, (duration + delay) * 1000);
        }

        // Crear elementos continuamente cada 300ms
        setInterval(createFloatingElement, 300);
    </script>
</body>
</html>
